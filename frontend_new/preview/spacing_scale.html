<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-mono); display:flex; gap:14px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { background:oklch(0.74 0.13 65 / 0.4); border:1px solid oklch(0.74 0.13 65 / 0.6); border-radius:6px; }
  .lbl { font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-500); }
  .px  { font-size:11px; color:var(--ink-700); }
</style></head><body>
<div class="item"><div class="box" style="width:4px;height:4px"></div><div class="lbl">s-1</div><div class="px">4px</div></div>
<div class="item"><div class="box" style="width:8px;height:8px"></div><div class="lbl">s-2</div><div class="px">8px</div></div>
<div class="item"><div class="box" style="width:12px;height:12px"></div><div class="lbl">s-3</div><div class="px">12px</div></div>
<div class="item"><div class="box" style="width:16px;height:16px"></div><div class="lbl">s-4</div><div class="px">16px</div></div>
<div class="item"><div class="box" style="width:20px;height:20px"></div><div class="lbl">s-5</div><div class="px">20px</div></div>
<div class="item"><div class="box" style="width:24px;height:24px"></div><div class="lbl">s-6</div><div class="px">24px</div></div>
<div class="item"><div class="box" style="width:28px;height:28px"></div><div class="lbl">s-7</div><div class="px">28px</div></div>
<div class="item"><div class="box" style="width:32px;height:32px"></div><div class="lbl">s-8</div><div class="px">32px</div></div>
<div class="item"><div class="box" style="width:48px;height:48px"></div><div class="lbl">s-12</div><div class="px">48px</div></div>
<div class="item"><div class="box" style="width:64px;height:64px"></div><div class="lbl">s-16</div><div class="px">64px</div></div>
</body></html>
