<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:32px; background:linear-gradient(180deg,#f7c98a,#f4a06a); font-family:var(--font-ui); display:flex; gap:24px; align-items:center; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .b { width:120px; height:80px; border-radius:18px; background:rgba(255,248,235,0.55); }
  .b1 { box-shadow: 0 16px 32px -20px rgba(40,24,10,0.22), 0 2px 6px -2px rgba(40,24,10,0.08); }
  .b2 { background:rgba(255,248,235,0.42); backdrop-filter:blur(18px) saturate(140%); border:1px solid rgba(255,245,225,0.55); box-shadow:0 18px 40px -16px rgba(40,24,10,0.32), 0 4px 14px -6px rgba(40,24,10,0.18), inset 0 1px 0 rgba(255,255,255,0.5); }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:rgba(28,20,16,0.7); }
</style></head><body>
<div class="item"><div class="b b1"></div><div class="lbl">card · paper</div></div>
<div class="item"><div class="b b2"></div><div class="lbl">glass · over scene</div></div>
</body></html>
