<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start; }
  .input { width:240px; border:1px solid rgba(28,20,16,0.12); border-radius:14px; background:rgba(255,252,245,0.7); color:#1c1410; font-size:15px; outline:none; padding:14px 16px; }
  .input.focus { border-color:oklch(0.74 0.13 65); box-shadow:0 0 0 3px oklch(0.74 0.13 65 / 0.18); }
  .input::placeholder { color:#b3a094; }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#6b574c; margin-bottom:6px; }
</style></head><body>
<div>
  <div class="lbl">Default</div>
  <input class="input" placeholder="Email or username" />
</div>
<div>
  <div class="lbl">Filled</div>
  <input class="input" value="joe@anderson.co" />
</div>
<div>
  <div class="lbl">Focus</div>
  <input class="input focus" value="Tonal2026" type="password" />
</div>
</body></html>
