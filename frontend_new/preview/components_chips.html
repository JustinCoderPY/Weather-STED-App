<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:999px; background:rgba(255,248,235,0.85); border:1px solid rgba(28,20,16,0.06); color:#3a2a22; font-size:13px; font-weight:500; }
  .req { display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:999px; font-family:var(--font-mono); font-size:11px; }
  .req.ok { background:rgba(120,160,90,0.15); color:#3a5a30; }
  .req.no { background:rgba(28,20,16,0.06); color:#6b574c; }
  .req i { width:6px; height:6px; border-radius:999px; }
  .req.ok i { background:#5e8c3e; }
  .req.no i { background:#bdb0a4; }
  .summary { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:999px; background:rgba(255,248,235,0.85); border:1px solid rgba(255,245,225,0.55); color:#1c1410; font-size:14px; font-weight:600; box-shadow:0 4px 14px -6px rgba(40,24,10,0.18); }
</style></head><body>
<div class="chip">Feels 50°</div>
<div class="chip">H 55°</div>
<div class="chip">L 49°</div>
<div class="summary"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1-.5-7.97A6 6 0 0 1 18 9.5 4.5 4.5 0 0 1 17.5 18z"/></svg> Overcast Clouds</div>
<div class="req ok"><i></i> 8+ characters</div>
<div class="req ok"><i></i> Uppercase</div>
<div class="req no"><i></i> Special char</div>
</body></html>
