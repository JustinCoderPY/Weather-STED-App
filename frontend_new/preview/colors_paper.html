<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { width:122px; }
  .chip { width:122px; height:80px; border-radius:18px; box-shadow:0 4px 12px -4px rgba(40,24,10,0.18); }
  .lbl { margin-top:8px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-500); }
  .nm  { font-family:var(--font-display); font-size:16px; color:var(--ink-900); margin-top:2px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--ink-700); margin-top:1px; }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#fbf6ee; border:1px solid rgba(28,20,16,0.06)"></div><div class="lbl">Paper</div><div class="nm">Paper 50</div><div class="hex">#FBF6EE</div></div>
  <div class="sw"><div class="chip" style="background:#f4ebdd"></div><div class="lbl">Paper</div><div class="nm">Paper 100</div><div class="hex">#F4EBDD</div></div>
  <div class="sw"><div class="chip" style="background:#e8d9c2"></div><div class="lbl">Paper</div><div class="nm">Paper 200</div><div class="hex">#E8D9C2</div></div>
  <div class="sw"><div class="chip" style="background:#ddc7a4"></div><div class="lbl">Paper</div><div class="nm">Paper 300</div><div class="hex">#DDC7A4</div></div>
</div>
</body></html>
