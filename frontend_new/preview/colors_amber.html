<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); }
  .row { display:flex; gap:14px; flex-wrap:wrap; }
  .sw { width:122px; }
  .chip { width:122px; height:80px; border-radius:18px; box-shadow:0 4px 12px -4px rgba(40,24,10,0.18); }
  .lbl { margin-top:8px; font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-500); }
  .nm  { font-family:var(--font-display); font-size:16px; color:var(--ink-900); margin-top:2px; }
  .hex { font-family:var(--font-mono); font-size:11px; color:var(--ink-700); margin-top:1px; }
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:oklch(0.62 0.15 55)"></div><div class="lbl">Accent</div><div class="nm">Amber Deep</div><div class="hex">pressed</div></div>
  <div class="sw"><div class="chip" style="background:oklch(0.74 0.13 65)"></div><div class="lbl">Accent</div><div class="nm">Amber</div><div class="hex">primary CTA</div></div>
  <div class="sw"><div class="chip" style="background:oklch(0.92 0.06 75)"></div><div class="lbl">Accent</div><div class="nm">Amber Soft</div><div class="hex">chip fills</div></div>
</div>
</body></html>
