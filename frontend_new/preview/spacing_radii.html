<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); display:flex; gap:18px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .b { width:78px; height:78px; background:#f4ebdd; border:1px solid rgba(28,20,16,0.06); }
  .lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--ink-500); }
  .px  { font-family:var(--font-mono); font-size:11px; color:var(--ink-700); }
</style></head><body>
<div class="item"><div class="b" style="border-radius:10px"></div><div class="lbl">r-xs</div><div class="px">10px</div></div>
<div class="item"><div class="b" style="border-radius:14px"></div><div class="lbl">r-sm</div><div class="px">14px</div></div>
<div class="item"><div class="b" style="border-radius:20px"></div><div class="lbl">r-md</div><div class="px">20px</div></div>
<div class="item"><div class="b" style="border-radius:28px"></div><div class="lbl">r-lg</div><div class="px">28px</div></div>
<div class="item"><div class="b" style="border-radius:36px"></div><div class="lbl">r-xl</div><div class="px">36px</div></div>
<div class="item"><div class="b" style="border-radius:999px"></div><div class="lbl">r-pill</div><div class="px">999</div></div>
</body></html>
