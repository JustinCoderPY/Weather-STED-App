<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); display:flex; align-items:center; }
  .specimen { font-family:var(--font-display); font-size:124px; line-height:0.86; color:var(--ink-900); letter-spacing:-0.03em; }
  .meta { color:var(--ink-500); font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:6px; }
  .name { color:var(--ink-700); font-family:var(--font-ui); font-size:13px; margin-top:8px; }
  .col { margin-left:32px; }
</style></head><body>
<div>
  <div class="meta">Display</div>
  <div class="specimen">52°</div>
</div>
<div class="col">
  <div class="meta">DM Serif Display</div>
  <div style="font-family:var(--font-display); font-size:44px; line-height:1; color:var(--ink-900);">Skies. Quietly.</div>
  <div class="name">200 / 124 / 64 / 44 / 32 / 24 px · weight 400 only</div>
</div>
</body></html>
