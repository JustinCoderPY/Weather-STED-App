<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:linear-gradient(180deg,#f7c98a,#f4a06a); font-family:var(--font-ui); height:300px; display:grid; place-items:center; }
  .stack { text-align:center; }
  .mark { display:inline-block; padding:14px 22px; border-radius:18px; background:#1c1410; }
  .mark span { font-family:var(--font-display); color:#fbf6ee; font-size:36px; letter-spacing:-0.02em; line-height:1; }
  .mark span sup { font-size:0.4em; vertical-align:super; opacity:0.6; }
  .tag { margin-top:14px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:#3a2a22; }
</style></head><body>
<div class="stack">
  <div class="mark"><span>Tonal<sup>°</sup></span></div>
  <div class="tag">Skies. Quietly.</div>
</div>
</body></html>
