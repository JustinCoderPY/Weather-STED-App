<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px; background:#fbf6ee; font-family:var(--font-ui); }
  .grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; }
  .sky { height:120px; border-radius:18px; position:relative; overflow:hidden; }
  .sky b { position:absolute; left:12px; bottom:10px; color:#fff; font-family:var(--font-display); font-size:18px; font-weight:400; text-shadow:0 2px 8px rgba(0,0,0,0.4); }
  .sky em { position:absolute; right:12px; top:10px; font-style:normal; color:rgba(255,255,255,0.85); font-family:var(--font-mono); font-size:9px; letter-spacing:0.1em; text-transform:uppercase; text-shadow:0 1px 4px rgba(0,0,0,0.4); }
  .morning { background:linear-gradient(180deg,#f9d3a0,#f5b58c 40%,#f3a4a0 75%,#e89cb3); }
  .day     { background:linear-gradient(180deg,#cfe6f5,#b9d8ec 40%,#a9cfe6 75%,#dde9ee); }
  .sunset  { background:linear-gradient(180deg,#f7c98a,#f4a06a 40%,#e0735a 75%,#a85b6e); }
  .night   { background:linear-gradient(180deg,#1c2640,#222c4a 40%,#33365e 75%,#4a3a5e); }
</style></head><body>
<div class="grid">
  <div class="sky morning"><em>Morning</em><b>Soft pinks</b></div>
  <div class="sky day"><em>Day</em><b>Cool blues</b></div>
  <div class="sky sunset"><em>Sunset</em><b>Warm amber</b></div>
  <div class="sky night"><em>Night</em><b>Dusty purple</b></div>
</div>
</body></html>
