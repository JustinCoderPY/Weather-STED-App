<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fbf6ee; font-family:var(--font-ui); }
  .row { display:flex; gap:32px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; gap:4px; }
  .meta { color:var(--ink-500); font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; }
  .body { color:var(--ink-700); font-size:15px; line-height:1.48; max-width:220px; }
  .small { color:var(--ink-500); font-size:13px; }
  .ui { color:var(--ink-900); font-size:15px; font-weight:600; }
</style></head><body>
<div class="row">
  <div class="item">
    <div class="meta">Body · Geist</div>
    <p class="body">Sign in to pick up where you left off. Geist 15px / 1.48 line height.</p>
  </div>
  <div class="item">
    <div class="meta">UI · 15 / 600</div>
    <span class="ui">Allow location</span>
    <span class="ui">Continue with Google</span>
  </div>
  <div class="item">
    <div class="meta">Small · 13</div>
    <span class="small">Last updated 4 months ago</span>
    <span class="small">Newark · New Jersey</span>
  </div>
  <div class="item">
    <div class="meta">Meta · JetBrains Mono</div>
    <span class="meta" style="font-size:11px">LOS ANGELES, CA</span>
    <span class="meta" style="font-size:11px">STEP 1 / 2</span>
  </div>
</div>
</body></html>
